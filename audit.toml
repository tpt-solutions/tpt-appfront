# cargo-audit configuration — advisories that cannot be resolved via an upgrade.
# The quick-xml CVEs are real vulnerabilities but reachable only through
# wayland-scanner's build-time parsing of trusted Wayland protocol .xml files,
# never through untrusted network input.
[advisories]
ignore = [
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0429",
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0384",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2026-0097",
    "RUSTSEC-2026-0192",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
