name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Native (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  wasm:
    name: WASM (browser backends)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p appfront-dom -p appfront-canvas --target wasm32-unknown-unknown
      - run: cargo clippy -p appfront-dom -p appfront-canvas --target wasm32-unknown-unknown --all-targets -- -D warnings

  examples:
    name: Examples (trunk build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/trunk-action@v0.5.0
        with:
          version: "latest"
      - name: Build every example under examples/*/index.html
        run: |
          set -e
          for dir in examples/*/; do
            if [ -f "$dir/index.html" ]; then
              echo "Building $dir"
              (cd "$dir" && trunk build)
            fi
          done
